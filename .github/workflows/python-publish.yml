
name: Upload Python Package

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write  # এটি অবশ্যই যোগ করতে হবে PyPI-তে আপলোড করার জন্য

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install build tool
        run: python -m pip install build --user
      - name: Build package
        run: python -m build
      - name: Publish package
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # যদি Trusted Publishing সেটআপ করে থাকেন, তবে নিচের লাইনটি লাগবে না
          password: ${{ secrets.PYPI_API_TOKEN }}